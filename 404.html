<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الصفحة غير موجودة | CANTO كانتو</title>
  <meta name="theme-color" content="#17120E" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@700;900&family=Poppins:wght@600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Cairo", system-ui, sans-serif;
      background: #17120E; color: #EFE6D8;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      background-image: radial-gradient(circle at 50% 0%, rgba(197,138,61,.16), transparent 60%);
    }
    .box { max-width: 520px; }
    .mark { font-family: "Poppins", sans-serif; font-weight: 600; letter-spacing: .25em; color: #EFE6D8; font-size: 1.3rem; }
    .mark .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #C58A3D; transform: translateY(-.5em); margin-inline-start: 3px; }
    h1 { font-family: "Tajawal", sans-serif; font-weight: 900; font-size: clamp(4rem, 18vw, 8rem); color: #C58A3D; line-height: 1; margin: 18px 0 6px; }
    h2 { font-family: "Tajawal", sans-serif; font-weight: 700; font-size: 1.5rem; margin-bottom: 12px; }
    p { color: #C9BCA9; margin-bottom: 30px; }
    a.btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #C58A3D; color: #17120E; font-family: "Tajawal", sans-serif; font-weight: 700;
      padding: 14px 28px; border-radius: 100px; text-decoration: none;
      transition: transform .3s, background .3s;
    }
    a.btn:hover { transform: translateY(-3px); background: #E0A95A; }
  </style>
</head>
<body>
  <div class="box">
    <div class="mark">CANTO<span class="dot"></span></div>
    <h1>404</h1>
    <h2>يبدو أن الفنجان وقع!</h2>
    <p>الصفحة اللي تبحث عنها غير موجودة أو تم نقلها. رجّعك للرئيسية ونكمّل قهوة.</p>
    <a class="btn" href="/">العودة للرئيسية</a>
  </div>
</body>
</html>
